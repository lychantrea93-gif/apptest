<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock System</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* CSS ខ្លីៗសម្រាប់ទូរស័ព្ទ */
        body { font-family: sans-serif; background: #f4f4f4; padding: 10px; margin: 0; padding-bottom: 70px; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-main { background: #2b7a3e; color: white; }
        .btn-out { background: #c0392b; color: white; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 12px; cursor: pointer; }
        .nav-item.active { color: #2b7a3e; font-weight: bold; border-top: 3px solid #2b7a3e; }
        .res-box { position: absolute; background: white; border: 1px solid #ddd; width: 90%; z-index: 100; display: none; max-height: 200px; overflow-y: auto; }
        .item-row { padding: 10px; border-bottom: 1px solid #eee; }
        .cart-item { background: #eee; padding: 8px; margin-top: 5px; border-radius: 5px; display: flex; justify-content: space-between; }
        .page { display: none; } .page.active { display: block; }
    </style>
</head>
<body>

<div id="page-in" class="page active">
    <div class="card">
        <h3 style="color:#2b7a3e">📥 STOCK IN</h3>
        <label>កាលបរិច្ឆេទ</label><input type="date" id="in-date">
        <label>ជ្រើសរើសដេប៉ូ</label><select id="in-depot"></select>
        <label>ទីតាំង/Zone</label><select id="in-zone"></select>
        <label>ស្វែងរកទំនិញ</label>
        <input type="text" id="in-search" placeholder="វាយឈ្មោះទំនិញ...">
        <div id="in-results" class="res-box"></div>
        <label>ចំនួន</label><input type="number" id="in-qty">
        <button class="btn-main" onclick="addToCart('in')">+ បន្ថែមក្នុងបញ្ជី</button>
        <div id="in-cart"></div>
        <label>រូបភាព</label><input type="file" id="in-photo" accept="image/*" multiple>
        <button id="in-btn-save" class="btn-main" style="margin-top:20px" onclick="submitData('in')">💾 រក្សាទុក</button>
    </div>
</div>

<div id="page-out" class="page">
    <div class="card">
        <h3 style="color:#c0392b">📤 STOCK OUT</h3>
        <label>កាលបរិច្ឆេទ</label><input type="date" id="out-date">
        <label>ជ្រើសរើសដេប៉ូ</label><select id="out-depot"></select>
        <label>ទីតាំង/Zone</label><select id="out-zone"></select>
        <label>ស្វែងរកទំនិញ</label>
        <input type="text" id="out-search" placeholder="វាយឈ្មោះទំនិញ...">
        <div id="out-results" class="res-box"></div>
        <label>ចំនួន</label><input type="number" id="out-qty">
        <button class="btn-out" onclick="addToCart('out')">+ បន្ថែមក្នុងបញ្ជី</button>
        <div id="out-cart"></div>
        <label>រូបភាព</label><input type="file" id="out-photo" accept="image/*" multiple>
        <button id="out-btn-save" class="btn-out" style="margin-top:20px" onclick="submitData('out')">💾 រក្សាទុក</button>
    </div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" onclick="switchPage('in', this)">IN</div>
    <div class="nav-item" onclick="switchPage('out', this)">OUT</div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxHGUUVi4WUTrjHj7qhZlNzIeJK1hb48nKQV2ghQqoih5nTINxP0glc99aVZAsIcUUq/exec";
    let appData = { items: [], depots: [], zones: [] };
    let carts = { in: [], out: [] };
    let selectedItem = null;

    async function init() {
        const res = await fetch(SCRIPT_URL);
        appData = await res.json();
        
        ['in', 'out'].forEach(type => {
            document.getElementById(type+'-depot').innerHTML = appData.depots.map(d => `<option value="${d}">${d}</option>`).join('');
            document.getElementById(type+'-zone').innerHTML = appData.zones.map(z => `<option value="${z}">${z}</option>`).join('');
            setupSearch(type);
        });
    }

    function setupSearch(type) {
        const input = document.getElementById(type+'-search');
        const resBox = document.getElementById(type+'-results');
        input.oninput = () => {
            const val = input.value.toLowerCase();
            if(!val) { resBox.style.display='none'; return; }
            const matches = appData.items.filter(i => i.name.toLowerCase().includes(val) || i.code.toLowerCase().includes(val));
            resBox.innerHTML = matches.map(i => `<div class="item-row" onclick="selectItem('${type}','${i.code}','${i.name}','${i.unit}')">${i.name} (${i.code})</div>`).join('');
            resBox.style.display = 'block';
        };
    }

    function selectItem(type, code, name, unit) {
        selectedItem = { code, name, unit };
        document.getElementById(type+'-search').value = name;
        document.getElementById(type+'-results').style.display = 'none';
    }

    function addToCart(type) {
        const qty = document.getElementById(type+'-qty').value;
        if(!selectedItem || !qty) return alert("សូមរើសទំនិញ និងចំនួន");
        carts[type].push({...selectedItem, qty});
        document.getElementById(type+'-cart').innerHTML = carts[type].map((i, idx) => `<div class="cart-item"><span>${i.name} x ${i.qty}</span></div>`).join('');
        selectedItem = null; document.getElementById(type+'-search').value = ''; document.getElementById(type+'-qty').value = '';
    }

    async function submitData(type) {
        const btn = document.getElementById(type+'-btn-save');
        btn.disabled = true; btn.innerText = "កំពុងរក្សាទុក...";
        
        const payload = {
            action: type === 'in' ? 'saveStockIn' : 'saveStockOut',
            date: document.getElementById(type+'-date').value,
            depot: document.getElementById(type+'-depot').value,
            zone: document.getElementById(type+'-zone').value,
            items: carts[type],
            images: [],
            user: window.Telegram.WebApp.initDataUnsafe?.user?.first_name || "Admin"
        };

        const files = document.getElementById(type+'-photo').files;
        for (let f of files) {
            const b64 = await new Promise(r => {
                const rd = new FileReader();
                rd.onload = () => r(rd.result.split(',')[1]);
                rd.readAsDataURL(f);
            });
            payload.images.push(b64);
        }

        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        alert("ជោគជ័យ!");
        location.reload();
    }

    function switchPage(p, el) {
        document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(nv => nv.classList.remove('active'));
        document.getElementById('page-'+p).classList.add('active');
        el.classList.add('active');
    }

    document.getElementById('in-date').valueAsDate = new Date();
    document.getElementById('out-date').valueAsDate = new Date();
    init();
</script>
</body>
</html>
